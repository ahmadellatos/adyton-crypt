[pytest]
# Jalankan dari root proyek
# Contoh: pytest -v

testpaths     = tests
python_files  = test_*.py
python_classes= Test*
python_functions = test_*

# Default options yang bagus untuk development
addopts =
    -v
    --tb=short
    --strict-markers
    --strict-config
    -ra

# Tampilkan print() dalam test (berguna untuk debug)
# Hilangkan -s jika tidak mau lihat output

# =============================================================================
# Custom Markers (gunakan untuk filtering)
# =============================================================================
# Contoh penggunaan:
#   pytest -m security
#   pytest -m "not slow"
#   pytest -m "security and edge"
markers =
    security: tests yang berkaitan langsung dengan keamanan kriptografi
    edge: edge case dan input yang tidak terduga
    integration: test end-to-end (kunci → buka)
    slow: test yang memakan waktu lama (stress test, dll)
    qt: test yang membutuhkan PySide6/Qt event loop

# =============================================================================
# Notes untuk CI / Quality Gate
# =============================================================================
# Disarankan di CI:
#   pytest --cov=core --cov-report=term-missing --cov-fail-under=80
# =============================================================================