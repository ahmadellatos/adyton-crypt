[tool.ruff]
# Ruff configuration for Adyton Crypt
# Very fast linter + formatter

line-length = 100
target-version = "py310"

[tool.ruff.lint]
# Enable a good set of rules
select = [
    "E",      # pycodestyle errors
    "F",      # Pyflakes
    "I",      # isort
    "UP",     # pyupgrade
    "B",      # flake8-bugbear
    "S",      # flake8-bandit (security)
    "C4",     # flake8-comprehensions
    "SIM",    # flake8-simplify
]

ignore = [
    "E501",    # line too long (handled by formatter)
    "S101",    # assert used (we use it in tests)
    "S105",    # possible hardcoded password (false positives in crypto code sometimes)
    "S311",    # random is not cryptographically secure (we use os.urandom where it matters)
    "SIM102",  # nested if statements (intentional in Qt event filters for readability)
]

[tool.ruff.lint.per-file-ignores]
# Allow assert + guarded imports (pytest.importorskip before importing Qt) in tests
"tests/**" = ["S101", "E402"]
# core/vault.py re-exports the public API + test-only private helpers from the
# vault_* submodules; those imports are never called locally by design.
"core/vault.py" = ["F401"]

[tool.ruff.format]
quote-style = "double"
indent-style = "space"
